server:
  port: 8081 # Unique port for Account Service
  shutdown: graceful

spring:
  application:
    name: account-service
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    url: jdbc:postgresql://localhost:5432/ACCOUNT_SERVICE
    username: admin
    password: admin
  jpa:
    hibernate:
      ddl-auto: update # Automatically creates tables based on Java classes
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect


management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always